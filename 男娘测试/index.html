        @keyframes hardcore-glitch {
            0% {
                transform: translate(0) skew(0deg);
                filter: blur(0px) contrast(150%) hue-rotate(-20deg) sepia(50%) saturate(400%);
            }

            20% {
                transform: translate(-5px, 5px) skew(-5deg);
                filter: blur(1px) contrast(200%) hue-rotate(0deg) sepia(100%) saturate(600%) invert(15%);
            }

            40% {
                transform: translate(-5px, -5px) skew(5deg);
                filter: blur(0px) contrast(150%) hue-rotate(-20deg) sepia(50%) saturate(400%);
            }

            60% {
                transform: translate(5px, 5px) skew(-2deg);
                filter: blur(2px) contrast(250%) hue-rotate(15deg) sepia(80%) saturate(500%) invert(30%);
            }

            80% {
                transform: translate(5px, -5px) skew(2deg);
                filter: blur(0px) contrast(150%) hue-rotate(-20deg) sepia(50%) saturate(400%);
            }

            100% {
                transform: translate(0) skew(0deg);
                filter: blur(0px) contrast(150%) hue-rotate(-20deg) sepia(50%) saturate(400%);
            }
        }

        .spam-punish-effect {
            animation: hardcore-glitch 0.2s infinite;
            background-color: #2a0000 !important;
            color: #ff3333;
            background-image: repeating-linear-gradient(45deg, rgba(255, 0, 0, 0.1) 0px, rgba(255, 0, 0, 0.1) 10px, transparent 10px, transparent 20px) !important;
        }

        .spam-punish-effect::before {
            content: attr(data-punish-stamp);
            position: fixed;
            top: 40%;
            left: -10%;
            width: 120%;
            text-align: center;
            font-size: 60px;
            color: rgba(255, 0, 0, 0.4);
            z-index: 100;
            font-weight: 900;
            transform: rotate(-15deg);
            pointer-events: none;
            letter-spacing: 15px;
            text-shadow: 4px 4px 0px rgba(0, 255, 255, 0.3), -4px -4px 0px rgba(255, 255, 0, 0.3);
            white-space: nowrap;
        }

        .spam-punish-effect .conclusion-box {

            color: #ff9999;

        .spam-punish-effect .btn-main {

            color: #ff6666 !important;
            border: 2px solid #ff0000;
            box-shadow: 0 0 10px #ff0000;
        }

        .spam-punish-effect h3,

            color: #ff0000 !important;
            text-shadow: 2px 2px 0px #000;
        }

        .spam-punish-effect p,
        .spam-punish-effect .trait-text {
            color: #ffcccc !important;

        .spam-punish-effect #final-score {

        .trait-section {

        .trait-label {
            font-weight: bold;
            color: var(--primary);
            display: inline-block;
            margin-bottom: 4px;
        }

        .trait-text {
            color: #555;
            text-align: justify;
        }

        body.capture-mode,
        body.capture-mode * {
            letter-spacing: 0 !important;
            word-spacing: normal !important;
            text-rendering: geometricPrecision;
        }

        body.capture-mode .trait-text {
            text-align: left !important;
            text-align-last: left !important;
            word-break: break-word;
            overflow-wrap: break-word;
        }

        body.capture-mode .result-action-dock {
            display: none !important;
        }

        .result-action-dock {
            position: fixed;
            left: 50%;
            bottom: calc(14px + env(safe-area-inset-bottom, 0px));
            z-index: 9000;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            width: min(440px, calc(100% - 28px));
            padding: 10px;
            background: rgba(255, 255, 255, 0.92);
            border: 1px solid rgba(0, 0, 0, 0.08);
            border-radius: 18px;
            backdrop-filter: blur(12px);
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.2);
            opacity: 0;
            pointer-events: none;
            transform: translateX(-50%) translateY(18px);
            transition: opacity 0.24s ease, transform 0.24s ease;
        }

        .result-action-dock.is-visible {
            opacity: 1;
            pointer-events: auto;
            transform: translateX(-50%) translateY(0);
        }

        body.dark-mode .result-action-dock {
            background: rgba(30, 30, 46, 0.92);
            border-color: rgba(255, 255, 255, 0.08);
        }

        .result-action-dock button {
            border: none;
            border-radius: 10px;
            padding: 10px 6px;
            color: #fff;
            font-size: 12px;
            font-weight: 900;
            cursor: pointer;
            min-width: 0;
        }

        #btn-stop-glitch {
            transition: bottom 0.24s ease, transform 0.24s ease, opacity 0.2s ease;
        }

        body.dock-visible #btn-stop-glitch {
            bottom: calc(92px + env(safe-area-inset-bottom, 0px)) !important;
        }

        .toast {
            position: fixed;
            left: 50%;
            bottom: 24px;
            transform: translateX(-50%) translateY(20px);
            background: rgba(30, 30, 46, 0.94);
            color: #fff;
            border-radius: 999px;
            padding: 10px 16px;
            font-size: 13px;
            font-weight: 800;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s, transform 0.2s;
            z-index: 12000;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.22);
            white-space: nowrap;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* 加载动画 */
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
